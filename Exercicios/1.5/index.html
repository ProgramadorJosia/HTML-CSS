<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando abilidades</title>
</head>
<body>
    <h1>MÍDIAS</h1>

    <h2>Inserindo imagens dinámicas no site</h2>
    <p>inseri aqui as suas imagens</p>
    <picture>
        <source media="(max-width:700px )" srcset="imagens/foto-p.jpg" type="image/jpg">
        <source media="(max-width:1000px )" srcset="imagens/foto-m.jpg" type="image/jpg">
        <img src="imagens/foto-g.jpg" alt="Nossas imagens">
    </picture>
    <h2>Inserindo video no site</h2>
    <p>Os nossos videos</p>
    <video width="500" autoplay controls loop poster="imagens/1755618198099.jpg">
        <source src="video/A Disciplina Japonesa Que Faz Até os Mais Preguiçosos Mudarem.mp4" type="video/mp4">
    </video>

    <h2>Inserindo audio no site</h2>
    <p>os nossos audios</p>
    <audio controls loop autoplay preload="metadata">
        <source src="audio/Aline Barros  Ressuscitame (Clipe Oficial MK Music HD).mp3" type="audio/mpeg">
    </audio>

    
</body>
</html>
