<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>textandot</title>
</head>
<style>
    div{
        background-color: brown;
        border: 1px solid black;
        color: rgb(158, 161, 161);
        text-align: center;
        width: 150px;
        height: 150px;

    }
    div> p{
        display: none;
    }
    div:hover> p{
        display: block;
        background-color: black;
        color: antiquewhite;
    }
</style>
<body>
    <div>
        CLIQUE AQUI
        <P>Josia</P>
    </div>
    
</body>
</html>
